<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node Creation & Editing Test</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        .toolbar {
            padding: 15px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
        }
        h2 { margin: 0; font-size: 16px; color: #3b82f6; }
        p { margin: 5px 0 0 0; font-size: 12px; color: #888; }
        
        #canvas-container {
            width: 100%;
            height: 35vh; 
            background: #181818;
            position: relative;
            touch-action: none; /* Prevents scrolling when tapping canvas on mobile */
            border-bottom: 1px solid #333;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        .bottom-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
        }

        .properties-panel {
            padding: 15px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
        }
        
        .prop-title {
            color: #22c55e;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        label { font-size: 12px; color: #aaa; width: 50px; }
        input[type="text"], input[type="number"] {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
        }
        input:disabled { background: #111; color: #555; }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #ddd;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            flex: 1;
            touch-action: manipulation;
        }
        button:active { background: #2563eb; }
        button:disabled { background: #444; color: #888; }
        #btnClear { background: #ef4444; flex: 0.4; }
        #btnClear:active { background: #dc2626; }

        .data-panel {
            padding: 15px;
            background: #000;
            flex: 1;
        }
        pre {
            margin: 0;
            font-family: monospace;
            font-size: 11px;
            color: #22c55e;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Node Workflow (Phase 2)</h2>
        <p>Tap empty space to create. Tap a node to select and edit.</p>
    </div>

    <div id="canvas-container">
        <canvas id="gridCanvas"></canvas>
    </div>

    <div class="bottom-area">
        <!-- Properties Panel -->
        <div class="properties-panel">
            <div class="prop-title" id="propTitle">Properties: No Node Selected</div>
            
            <div class="input-row">
                <label>ID</label>
                <input type="text" id="nodeId" disabled placeholder="---">
            </div>
            
            <div class="input-row">
                <label>X, Y</label>
                <input type="number" id="nodeX" disabled placeholder="X">
                <input type="number" id="nodeY" disabled placeholder="Y">
            </div>

            <div class="input-row">
                <label>Label</label>
                <input type="text" id="nodeLabel" disabled placeholder="Optional label">
            </div>

            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="nodeVisible" disabled> Visible
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="nodeLocked" disabled> Locked
                </label>
            </div>

            <div class="btn-group">
                <button id="btnApply" disabled>Apply Changes</button>
                <button id="btnClear">Clear All</button>
            </div>
        </div>

        <!-- JSON Output Panel -->
        <div class="data-panel">
            <div style="color: #888; margin-bottom: 5px; font-size: 12px;">MODEL DATA (JSON):</div>
            <pre id="output">{}</pre>
        </div>
    </div>

    <script type="module">
        import { Node } from './core/modeling/Node.js';
        import { Model } from './core/modeling/Model.js';

        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        
        let model = new Model("Phase 2 Test");
        let nodeCounter = 1;
        let selectedNodeId = null;

        const scale = 40; 
        let originX, originY;

        // UI Elements
        const elTitle = document.getElementById('propTitle');
        const elId = document.getElementById('nodeId');
        const elX = document.getElementById('nodeX');
        const elY = document.getElementById('nodeY');
        const elLabel = document.getElementById('nodeLabel');
        const elVisible = document.getElementById('nodeVisible');
        const elLocked = document.getElementById('nodeLocked');
        const btnApply = document.getElementById('btnApply');
        const btnClear = document.getElementById('btnClear');

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            originX = canvas.width / 2;
            originY = canvas.height / 2;
            render();
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Interaction Logic (Create & Select) ---
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pixelX = e.clientX - rect.left;
            const pixelY = e.clientY - rect.top;

            let engX = (pixelX - originX) / scale;
            let engY = -(pixelY - originY) / scale; 
            engX = Math.round(engX * 2) / 2; 
            engY = Math.round(engY * 2) / 2; 

            // Hit Detection
            let clickedExisting = false;
            const hitTolerance = 15; // pixels

            for (const [id, node] of model.nodes.entries()) {
                const px = originX + (node.x * scale);
                const py = originY - (node.y * scale);
                const dist = Math.hypot(pixelX - px, pixelY - py);
                
                if (dist < hitTolerance) {
                    selectNode(node.id);
                    clickedExisting = true;
                    break;
                }
            }

            // Create New Node
            if (!clickedExisting) {
                const newNode = new Node("N" + nodeCounter++, engX, engY);
                model.addNode(newNode);
                selectNode(newNode.id); 
            }
        });

        // --- Select Node ---
        function selectNode(id) {
            selectedNodeId = id;
            const node = model.findNodeById(id);
            
            if (node) {
                elTitle.innerText = `Properties: Selected [${node.id}]`;
                elTitle.style.color = "#eab308"; 
                
                elX.disabled = elY.disabled = elLabel.disabled = false;
                elVisible.disabled = elLocked.disabled = btnApply.disabled = false;

                elId.value = node.id;
                elX.value = node.x;
                elY.value = node.y;
                elLabel.value = node.label;
                elVisible.checked = node.visible;
                elLocked.checked = node.locked;
            } else {
                // Deselect state
                elTitle.innerText = "Properties: No Node Selected";
                elTitle.style.color = "#22c55e"; 
                elX.disabled = elY.disabled = elLabel.disabled = true;
                elVisible.disabled = elLocked.disabled = btnApply.disabled = true;
                elId.value = elX.value = elY.value = elLabel.value = "";
                elVisible.checked = elLocked.checked = false;
            }
            render();
            updateJSON();
        }

        // --- Edit Logic ---
        btnApply.addEventListener('click', () => {
            if (!selectedNodeId) return;
            
            const node = model.findNodeById(selectedNodeId);
            if (node) {
                node.unlock(); 
                node.setPosition(parseFloat(elX.value) || 0, parseFloat(elY.value) || 0);
                
                node.label = elLabel.value;
                if (elVisible.checked) node.show(); else node.hide();
                if (elLocked.checked) node.lock();
                
                model._invalidateResults(); 

                render();
                updateJSON();
                
                elTitle.innerText = "Changes Applied ✓";
                elTitle.style.color = "#22c55e";
                setTimeout(() => { 
                    if(selectedNodeId === node.id) elTitle.style.color = "#eab308"; 
                }, 1000);
            }
        });

        // --- Clear Tool ---
        btnClear.addEventListener('click', () => {
            model = new Model("Phase 2 Test");
            nodeCounter = 1;
            selectNode(null); // Deselect and clear form
        });

        // --- Rendering Engine ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Grid & Axes
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let x = originX % scale; x < canvas.width; x += scale) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for(let y = originY % scale; y < canvas.height; y += scale) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();

            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY); 
            ctx.moveTo(originX, 0); ctx.lineTo(originX, canvas.height); 
            ctx.stroke();

            // Draw Nodes
            model.nodes.forEach(node => {
                const px = originX + (node.x * scale);
                const py = originY - (node.y * scale);
                const isSelected = (node.id === selectedNodeId);

                ctx.beginPath();
                ctx.arc(px, py, isSelected ? 8 : 6, 0, Math.PI * 2); 
                
                if (!node.visible) {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; 
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                } else {
                    ctx.fillStyle = '#3b82f6';
                    ctx.strokeStyle = isSelected ? '#eab308' : '#fff'; 
                }
                
                ctx.fill();
                ctx.lineWidth = isSelected ? 3 : 2;
                ctx.stroke();

                if (node.visible || isSelected) {
                    ctx.fillStyle = isSelected ? '#eab308' : '#fff';
                    ctx.font = '11px sans-serif';
                    let displayString = `${node.id}`;
                    if (node.label) displayString += ` "${node.label}"`;
                    if (node.locked) displayString += ` [LOCKED]`;
                    
                    ctx.fillText(displayString, px + 12, py - 12);
                }
            });
        }

        function updateJSON() {
            output.innerText = model.toJSON();
        }
    </script>
</body>
</html>
