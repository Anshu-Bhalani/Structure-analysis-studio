<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node & Model Interactive Test</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        .toolbar {
            padding: 15px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h2 { margin: 0; font-size: 16px; color: #3b82f6; }
        button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
        }
        #canvas-container {
            width: 100%;
            height: 50vh;
            background: #181818;
            position: relative;
            touch-action: none; /* Prevents scrolling when tapping canvas on mobile */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .data-panel {
            flex: 1;
            padding: 15px;
            background: #000;
            overflow-y: auto;
            border-top: 1px solid #333;
        }
        pre {
            margin: 0;
            font-family: monospace;
            font-size: 12px;
            color: #22c55e;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>Tap Canvas to Create Nodes</h2>
        <button id="clearBtn">Clear</button>
    </div>

    <div id="canvas-container">
        <canvas id="gridCanvas"></canvas>
    </div>

    <div class="data-panel">
        <div style="color: #888; margin-bottom: 10px; font-size: 12px;">MODEL DATA (JSON):</div>
        <pre id="output">{}</pre>
    </div>

    <script type="module">
        import { Node } from './core/modeling/Node.js';
        import { Model } from './core/modeling/Model.js';

        // --- Setup ---
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        
        let model = new Model("Interactive Test");
        let nodeCounter = 1;

        // Viewport settings (1 unit = 40 pixels for display)
        const scale = 40; 
        let originX, originY;

        // --- Resize & Setup Canvas ---
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            // Set (0,0) to the center of the canvas
            originX = canvas.width / 2;
            originY = canvas.height / 2;
            render();
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Core Interaction ---
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            
            // 1. Read raw mouse/touch pixel coordinates
            const pixelX = e.clientX - rect.left;
            const pixelY = e.clientY - rect.top;

            // 2. Convert pixels to engineering coordinates (Grid snapping to nearest 0.5)
            let engX = (pixelX - originX) / scale;
            let engY = -(pixelY - originY) / scale; // Invert Y so UP is positive
            
            engX = Math.round(engX * 2) / 2; // Snap to 0.5
            engY = Math.round(engY * 2) / 2; // Snap to 0.5

            // 3. Create Node object & Assign unique ID
            const nodeId = "N" + nodeCounter++;
            const newNode = new Node(nodeId, engX, engY);

            // 4. Store in Model
            try {
                model.addNode(newNode);
                render();
                updateJSON();
            } catch (err) {
                alert(err.message);
            }
        });

        // --- Rendering Engine ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Grid & Axes
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            // Vertical lines
            for(let x = originX % scale; x < canvas.width; x += scale) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            // Horizontal lines
            for(let y = originY % scale; y < canvas.height; y += scale) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();

            // Draw X and Y Axes
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, originY); ctx.lineTo(canvas.width, originY); // X
            ctx.moveTo(originX, 0); ctx.lineTo(originX, canvas.height); // Y
            ctx.stroke();

            // Draw Nodes from the Model
            model.nodes.forEach(node => {
                // Convert engineering coords back to screen pixels
                const px = originX + (node.x * scale);
                const py = originY - (node.y * scale);

                // Draw Node Circle
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#3b82f6'; // Blue
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw Label
                ctx.fillStyle = '#fff';
                ctx.font = '12px sans-serif';
                ctx.fillText(`${node.id} (${node.x}, ${node.y})`, px + 10, py - 10);
            });
        }

        // --- Update Output ---
        function updateJSON() {
            // Re-parse to show exactly what's inside the model
            output.innerText = model.toJSON();
        }

        // --- Clear Tool ---
        document.getElementById('clearBtn').addEventListener('click', () => {
            model = new Model("Interactive Test");
            nodeCounter = 1;
            render();
            updateJSON();
        });

    </script>
</body>
</html>
